version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: 'weekly'
      day: 'saturday'
      time: '06:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
      include: 'scope'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: 'weekly'
      day: 'saturday'
      time: '06:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
      include: 'scope'
