name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-net10:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:ContinuousIntegrationBuild=true

      - name: Test (net8.0)
        run: dotnet test --no-build --configuration Release --framework net8.0

      - name: Test (net10.0)
        run: dotnet test --no-build --configuration Release --framework net10.0

      - name: Pack
        run: dotnet pack --no-build --configuration Release -p:ContinuousIntegrationBuild=true

  test-net48:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test --no-build --configuration Release --framework net48
